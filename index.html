/* === MEUS design tokens (source: tokens/meus-tokens.css — 디자인 갱신 시 이 블록만 교체) === */
:root{
 --drive:#D85A30;--drive-deep:#B84A26;--connect:#1D9E75;--connect-deep:#178A66;
 --order:#378ADD;--order-deep:#2F78C2;--explore:#7F77DD;--explore-deep:#6B63C4;
 --ink:#1C1814;--ink-soft:#3B352C;--mute:#5E574A;--faint:#857C6A;
 --rule:#D8CFBE;--rule-strong:#C8BDA8;--hairline:#E2D9C8;--paint:#E8E0D0;--fill:#EFE8DA;
 --panel:#FBF7EE;--screen:#F6F1E6;--paper:#F1EBDF;--paper-pure:#FFFDF8;--chrome:#EAE2D2;
 --font-display:'Archivo','Pretendard','Apple SD Gothic Neo',sans-serif;
 --font-sans:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
 --font-mono:'JetBrains Mono','Pretendard','Apple SD Gothic Neo',monospace;
 --card:var(--panel);--muted:var(--mute);--line:var(--rule);--soft:var(--fill);--hero:var(--ink);
}
body.dark{
 --ink:#EDE7D9;--ink-soft:#CFC6B5;--mute:#9A8E7A;--faint:#7C7263;
 --rule:#322C22;--rule-strong:#3D3527;--hairline:#2A2419;--paint:#241F18;--fill:#201B14;
 --panel:#1F1B14;--screen:#1A160F;--paper:#15120D;--paper-pure:#1A160F;--chrome:#211C14;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-sans);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;word-break:keep-all;transition:background .3s,color .3s}
::selection{background:var(--drive);color:var(--screen)}
.wrap{max-width:820px;margin:0 auto;padding:10px 20px 96px}
.wrap.result{max-width:900px}
.serif{font-family:var(--font-sans)}
.display{font-family:var(--font-display)}
.mono{font-family:var(--font-mono);font-feature-settings:"tnum"}
h1{font-size:clamp(30px,6vw,46px);font-weight:800;margin:0;line-height:1.08;letter-spacing:-.025em}
h2{font-size:20px;font-weight:800;margin:0;letter-spacing:-.02em}
h3{font-size:16px;font-weight:800;margin:0;letter-spacing:-.01em}
a{color:inherit}
.head{display:flex;align-items:baseline;gap:14px;border-top:2px solid var(--ink);padding-top:14px;margin:0 0 4px}
.head .ix{font-family:var(--font-mono);font-size:14px;font-weight:600;flex:none}
.nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto;padding:13px 20px;background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--rule)}
.wm{display:flex;align-items:center;gap:9px;text-decoration:none;font-family:var(--font-display);font-weight:900;letter-spacing:-.03em;font-size:20px}
.wm svg{display:block}
.navlink{font-family:var(--font-sans);font-weight:600;font-size:14.5px;color:var(--mute);text-decoration:none;margin-left:16px;border-bottom:1.5px solid transparent;padding-bottom:1px}
.navlink:hover{color:var(--ink);border-color:var(--rule)}
.iconbtn{border:1px solid var(--rule);background:var(--panel);border-radius:2px;width:32px;height:32px;cursor:pointer;color:var(--ink);font-size:15px;display:inline-flex;align-items:center;justify-content:center;margin-left:14px}
.card{background:var(--panel);border:1px solid var(--rule);border-radius:2px;padding:22px;margin-bottom:14px}
.btn{border:1px solid var(--rule);background:var(--panel);border-radius:2px;padding:13px 22px;font:inherit;font-weight:600;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s}
.btn:hover{border-color:var(--ink)}
.btn.dark{background:var(--ink);color:var(--screen);border-color:var(--ink)}
.btn.dark:hover{background:#000}
.btn:disabled{background:var(--paint);color:var(--faint);border-color:var(--rule);cursor:not-allowed;pointer-events:none}
.chip{border:1px solid var(--rule);background:var(--fill);border-radius:2px;padding:7px 13px;font:inherit;font-size:14.5px;color:var(--ink);cursor:pointer;transition:.12s}
.rank{display:flex;align-items:center;gap:16px;width:100%;text-align:left;border:1px solid var(--rule);background:transparent;border-radius:2px;padding:16px 18px;font:inherit;color:var(--ink);cursor:pointer;margin-bottom:11px;transition:border-color .15s,background .15s;line-height:1.45}
.rank:hover{border-color:var(--ink)}
.rdot{flex:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:14px;border:1px solid var(--rule-strong);color:var(--faint);transition:.12s}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.popt{border:1px solid var(--rule);background:var(--panel);border-radius:2px;padding:22px 18px;font:inherit;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;text-align:center;min-height:104px;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;line-height:1.45}
.popt:hover{border-color:var(--ink)}
.popt.on{color:var(--screen);border-color:transparent}
.freq{display:flex;gap:8px}
.fq{flex:1;border:1px solid var(--rule);background:var(--panel);border-radius:2px;padding:13px 4px;font:inherit;font-size:14px;color:var(--mute);cursor:pointer;text-align:center;transition:.12s;line-height:1.3}
.fq:hover{border-color:var(--ink)}
.fq.on{color:var(--screen);border-color:transparent;font-weight:700}
.bar{height:7px;border-radius:2px;background:var(--hairline);overflow:hidden}
input,textarea{width:100%;border:1px solid var(--rule);background:var(--panel);border-radius:2px;padding:12px 14px;font:inherit;color:var(--ink)}
input:focus,textarea:focus{outline:2px solid var(--ink);outline-offset:0;background:var(--paper-pure)}
.colophon{display:flex;flex-direction:column;gap:5px}
.colophon span{display:block;width:46px;height:7px}
.eyebrow,.kicker{font-family:var(--font-mono);font-size:12px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase}
.pill{border-radius:2px;padding:6px 12px;font-size:14.5px;font-weight:600}
.sec{font-family:var(--font-mono);font-size:12px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin:30px 2px 12px}
.tierlab{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--mute);flex:none;width:80px}
.pych{border-radius:2px;padding:6px 13px;font-size:14.5px;font-weight:700;color:var(--screen)}
.dialtrack{position:relative;height:22px}
.dialzones{position:absolute;inset:0;display:flex;border-radius:2px;overflow:hidden}
.dialmark{position:absolute;top:-9px;width:2px;height:40px;background:var(--ink)}
.dialmark::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;background:var(--ink);border:3px solid var(--panel)}
.minidial{position:relative;flex:1;height:7px}
.minidial .mk{position:absolute;top:-3px;width:2px;height:13px;background:var(--ink)}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--hairline);border:1px solid var(--hairline);border-radius:2px;overflow:hidden}
.kv>div{background:var(--paper-pure);padding:18px 20px}
.fade{animation:f .4s ease}
@keyframes f{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.fade{animation:none}.dialfill{transition:none!important}}
@media print{body{background:#fff}.noprint{display:none!important}.card{break-inside:avoid;box-shadow:none}.nav{display:none}}
@media (max-width:560px){.wrap{padding:8px 14px 64px}.pair{grid-template-columns:1fr}.popt{min-height:0;padding:16px}}
</style>
</head>

function packAnswers(s){
 var slots=[];
 A.forEach(function(q){var r=s.A[q.id]||[];for(var i=0;i<4;i++){var pos=r.indexOf(i);slots.push(pos<0?0:pos+1);}});
 LK.forEach(function(q){var v=s.LK[q.id];slots.push(v==null?0:v);});
 OV.forEach(function(q){var v=s.OV[q.id];slots.push(v==null?0:v);});
 D.forEach(function(q){var r=s.D[q.id]||[];for(var i=0;i<3;i++){var pos=r.indexOf(q.o[i].m);slots.push(pos<0?0:pos+1);}});
 E.forEach(function(q){var v=s.E[q.id];slots.push(v==null?0:DK.indexOf(v)+1);});
 VAL.forEach(function(vd){var pos=(s.V||[]).indexOf(vd.k);slots.push(pos<0?0:pos+1);});
 var bytes=[];for(var i=0;i<slots.length;i+=2)bytes.push((slots[i]||0)|((slots[i+1]||0)<<4));
 var bin='';bytes.forEach(function(b){bin+=String.fromCharCode(b);});
 return 'M5'+btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function unpackAnswers(code){
 try{
  if(!code||code.slice(0,2)!=='M5')return null;
  var b64=code.slice(2).replace(/-/g,'+').replace(/_/g,'/');var bin=atob(b64);
  var slots=[];for(var i=0;i<bin.length;i++){var b=bin.charCodeAt(i);slots.push(b&15,(b>>4)&15);}
  var s=blank(),idx=0;
  A.forEach(function(q){var picks=[];for(var i=0;i<4;i++){var v=slots[idx++];if(v>0)picks.push([i,v]);}picks.sort(function(a,b){return a[1]-b[1];});s.A[q.id]=picks.map(function(p){return p[0];});});
  LK.forEach(function(q){var v=slots[idx++];s.LK[q.id]=v===0?null:v;});
  OV.forEach(function(q){var v=slots[idx++];s.OV[q.id]=v===0?null:v;});
  D.forEach(function(q){var picks=[];for(var i=0;i<3;i++){var v=slots[idx++];if(v>0)picks.push([q.o[i].m,v]);}picks.sort(function(a,b){return a[1]-b[1];});s.D[q.id]=picks.map(function(p){return p[0];});});
  E.forEach(function(q){var v=slots[idx++];s.E[q.id]=v===0?null:DK[v-1];});
  var vpicks=[];VAL.forEach(function(vd){var v=slots[idx++];if(v>0)vpicks.push([vd.k,v]);});vpicks.sort(function(a,b){return a[1]-b[1];});s.V=vpicks.map(function(p){return p[0];});
  return s;
 }catch(e){return null;}
}

/* ---------- 관계 역학 (대인관계 이론 기반 상대적 분석) ---------- */
function relDynamics(ra,rb,na,nb){
 function rd(x){return Math.round(x);}
 function band(a,b){var hi=Math.max(a,b),lo=Math.min(a,b),gap=Math.abs(a-b);
  if(a>=58&&b>=58)return gap<14?'bothHighClose':'bothHighGap';
  if(hi>=58&&lo<46)return'oneHigh';
  if(a<48&&b<48)return'bothLow';return'mid';}
 function rcard(title,col,body){return'<div style="border:1px solid var(--rule);border-left:4px solid '+col+';border-radius:2px;background:var(--panel);padding:15px 17px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="width:8px;height:8px;border-radius:50%;background:'+col+'"></span><span style="font-weight:800;font-size:13.5px">'+title+'</span></div><div style="font-size:14px;line-height:1.62;color:var(--ink-soft)">'+body+'</div></div>';}
 var da=ra.ds,db=rb.ds,An=esc(na),Bn=esc(nb);
 // 헤드라인: 유사 vs 상보
 var diffs=FK.map(function(f){return Math.abs(ra.fs[f]-rb.fs[f]);});
 var meanDiff=rd(diffs.reduce(function(x,y){return x+y;},0)/diffs.length);
 var head=meanDiff<=12?'두 사람의 결이 전반적으로 <b>닮았습니다</b>(평균 차 '+meanDiff+'점). 라포가 빠르고 편하지만, <b>같은 자리에 사각지대를 공유</b>합니다 — 유사성은 호감을 키우는 대신(유사성–매력 가설) 빠진 동력을 둘 다 못 봅니다. 그 동력은 제3자가 채워야 해요.':meanDiff>=24?'두 사람의 결이 <b>뚜렷이 다릅니다</b>(평균 차 '+meanDiff+'점). 서로의 빈자리를 넓게 덮는 <b>상보형</b>입니다 — 커버리지는 강하지만, 같은 단어를 다르게 받아들이기 쉬워 의식적인 "번역"이 필요합니다.':'닮음과 다름이 섞여 있습니다(평균 차 '+meanDiff+'점) — 동력마다 통하는 곳과 어긋나는 곳이 갈립니다. 아래에서 동력별로 읽으세요.';
 // ── 종합 관계 해석(숲): 여러 facet을 엮은 통합 리딩 ──
 function who(f){var d=ra.fs[f]-rb.fs[f];return{d:Math.abs(d),hi:d>=0?An:Bn,lo:d>=0?Bn:An,hv:Math.max(ra.fs[f],rb.fs[f]),lv:Math.min(ra.fs[f],rb.fs[f])};}
 var synth=[];
 var Ldr=da.drive>=db.drive?An:Bn,Flw=da.drive>=db.drive?Bn:An;
 var ldrEdges=['lead','achieve'].filter(function(f){var w=who(f);return w.d>=10&&w.hi===Ldr;}).map(function(f){return FC[f].name;});
 synth.push('전체적으로 <b>'+Ldr+'</b>'+ig(Ldr)+' '+(ldrEdges.length?'<b>'+ldrEdges.join('·')+'</b>에서 앞서 ':'추진 동력에서 앞서 ')+'관계의 <b>방향을 잡고 끌고 가는</b> 쪽입니다. 하지만 한 사람이 끌고 한 사람이 끌려가는 단순한 그림이 아닙니다 —');
 var dec=who('decision');
 if(dec.d>=10){if(dec.hi===Flw)synth.push('<b>'+Flw+'</b>'+ig(Flw)+' 오히려 <b>결단</b>이 +'+dec.d+' 빠릅니다('+dec.hv+' vs '+dec.lv+') — '+Ldr+ig(Ldr)+' 큰 그림을 그리면 '+Flw+ig(Flw)+' 빠르게 결정을 끊어 실행으로 옮기는, <b>방향('+Ldr+')·결단('+Flw+') 분업</b>이 자연스럽습니다.');else synth.push('<b>'+Ldr+'</b>'+ig(Ldr)+' <b>결단</b>까지 +'+dec.d+' 높아 방향과 실행 속도를 함께 쥡니다 — '+Flw+eb(Flw)+' 속도 경쟁보다 다른 축에서 보완하는 편이 낫습니다.');}
 var conHolder=da.connect>=db.connect?An:Bn,conG=rd(Math.abs(da.connect-db.connect)),supW=who('support'),empW=who('empathy');
 if(conG>=8){var det=[];if(supW.d>=10)det.push('지지 +'+supW.d);if(empW.d>=10)det.push('공감 +'+empW.d);var detS=det.length?'('+det.join(', ')+') ':'';
  if(conHolder!==Ldr)synth.push('받치는 힘은 <b>'+conHolder+'</b>에게 있습니다 — <b>지지·공감</b>이 +'+conG+' 높아 '+detS+'<b>'+Ldr+'</b>의 추진을 떠받칩니다. '+Ldr+ig(Ldr)+' 밀어붙일 때 '+conHolder+ig(conHolder)+' 사람과 관계를 돌봐, '+Ldr+'의 결정에 <b>사람을 태우고</b> 부드럽게 만듭니다(조화는 상응적 상보).');
  else synth.push('게다가 <b>'+Ldr+'</b>'+ig(Ldr)+' <b>지지·공감</b>까지 +'+conG+' 높아 추진과 관계를 모두 쥡니다 — 강력하지만 혼자 다 짊어질 위험이 있어, 더 과업·논리적인 '+Flw+ig(Flw)+' 객관성·실무로 균형을 잡아줘야 합니다.');}
 var cauW=who('caution'),ordHolder=da.order>=db.order?An:Bn,ordG=rd(Math.abs(da.order-db.order));
 if(cauW.d>=10||ordG>=10){var brakeN=cauW.d>=10?cauW.hi:ordHolder,fastN=brakeN===An?Bn:An;synth.push('<b>'+brakeN+'</b>'+ig(brakeN)+' <b>신중</b>'+(cauW.d>=10?'(+'+cauW.d+')':'')+'이 높아 리스크부터 점검하는 <b>브레이크</b>입니다 — '+fastN+eb(fastN)+' 더 과감한 편이라 '+brakeN+'의 신중이 둘의 속도에 균형을 잡아요. 단 '+fastN+ig(fastN)+' '+brakeN+'의 "잠깐"을 답답해할 수 있으니 "어디까지 검토하고 갈지"를 미리 맞추세요.');}
 var visW=who('vision');
 if(visW.d>=10)synth.push('장기 관점·큰 그림은 <b>'+visW.hi+'</b>'+ig(visW.hi)+' +'+visW.d+' 더 봅니다('+visW.hv+' vs '+visW.lv+') — '+visW.lo+eb(visW.lo)+' 더 현실·실행에 가까워, 방향은 '+visW.hi+ig(visW.hi)+' 그리고 '+visW.lo+ig(visW.lo)+' 땅에 붙이는 조합입니다. '+visW.lo+'에겐 그 비전이 뜬구름처럼, '+visW.hi+'에겐 '+visW.lo+ig(visW.lo)+' 근시안으로 보일 수 있으니 서로의 시야를 번역하세요.');
 var la=ra.fs.lead,lb=rb.fs.lead;
 (function(){var loA=la<lb,loSeq=loA?ra.seq:rb.seq,loN=loA?An:Bn,hiN=loA?Bn:An;var acc=(loSeq||[]).filter(function(m){return m==='accommodate';}).length;if(Math.abs(la-lb)>=15&&acc>=2)synth.push('⚠ 다만 <b>'+loN+'</b>'+eb(loN)+' 갈등에서 <b>맞춰주는(수용)</b> 편이라 주도적인 '+hiN+' 앞에서 의견이 <b>묵살되기 쉽습니다</b> — '+hiN+ig(hiN)+' 먼저 "네 생각은?"으로 '+loN+'의 진짜 의견을 꺼내 줘야 건강합니다.');})();
 var flwAxis=(conHolder===Flw&&conG>=8)?'지지·공감으로 결정을 받치는':(dec.hi===Flw&&dec.d>=10)?'빠른 결단으로 실행을 끊는':(visW.hi===Flw&&visW.d>=10)?'비전으로 큰 그림을 더하는':(cauW.hi===Flw&&cauW.d>=10)?'신중으로 리스크를 거르는':'다른 축에서 보완하는';
 synth.push('<b>정리하면</b> — '+Ldr+ig(Ldr)+' 방향·추진을, '+Flw+ig(Flw)+' '+flwAxis+' 역할을 맡는 <b>보완 구조</b>입니다. 서로의 우위를 역할로 인정하면 시너지가, 같은 자리에서 겹치면 마찰이 됩니다.');
 var synthHtml=synth.map(function(t){return '<p style="margin:0 0 10px;font-size:14.5px;line-height:1.72;color:var(--ink-soft)">'+t+'</p>';}).join('');
 // 친화·신뢰
 // ── 미시 분석: facet 12개 개별 비교 (동력 평균이 가린 차이를 잡는다) ──
 function fillT(t,hiN,loN,hv,lv){return t.replace(/#Hn#/g,eb(hiN)).replace(/#Ln#/g,eb(loN)).replace(/#Hg#/g,ig(hiN)).replace(/#Lg#/g,ig(loN)).replace(/#He#/g,el(hiN)).replace(/#Le#/g,el(loN)).replace(/#H#/g,'<b>'+hiN+'</b>').replace(/#L#/g,'<b>'+loN+'</b>').replace(/#hv#/g,hv).replace(/#lv#/g,lv);}
 var GAP_T=10,gapList=[];
 var micro='';
 DK.forEach(function(d){
  var rows='';
  FK.filter(function(f){return FC[f].d===d&&f!=='lead'&&FREL[f];}).forEach(function(f){
   var a=ra.fs[f],b=rb.fs[f],diff=a-b,adf=Math.abs(diff),fr=FREL[f],kind=null,body='';
   if(adf>=GAP_T){kind='gap';var hiN=a>b?An:Bn,loN=a>b?Bn:An;body=fillT(fr.gap,hiN,loN,Math.max(a,b),Math.min(a,b));
    body+=adf>=30?'<br><b style="color:'+DR[d].hex+'">이 차이는 특히 큽니다</b> — 위 역할을 분명히 약속해두지 않으면 두 사람 사이 반복 마찰의 핵심이 돼요. 약점이 아니라 분담으로 보면 오히려 강점이 됩니다.':adf<20?'<br><span style="color:var(--faint)">차이가 크진 않으니, 이런 결이 있다는 걸 알아두는 정도면 충분해요.</span>':'';
    gapList.push(adf);}
   else if(Math.min(a,b)>=64){kind='both';body=fr.both;}

 var drives='';DK.forEach(function(k){var d=DR[k];

 var modes='';['assert','accommodate','analyze'].forEach(function(m){var t={assert:'맞서고 주장하며 밀어붙인다. 빠르지만 충돌 위험.',accommodate:'맞추고 양보해 관계를 지킨다. 따뜻하지만 곪을 위험.',analyze:'물러나 사실·논리를 따진다. 신중하지만 지연·단절 위험.'}[m];modes+='<div style="flex:1;min-width:200px;border:1px solid var(--rule);border-radius:2px;background:var(--panel);padding:16px 18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="width:9px;height:9px;border-radius:50%;background:'+MD[m].hex+'"></span><span style="font-weight:700;font-size:16px">'+MD[m].name+'</span><span class="display" style="font-size:13px;color:var(--mute)">'+MD[m].en+'</span></div><div style="font-size:13.5px;line-height:1.55;color:var(--ink-soft)">'+t+'</div></div>';});

 '<div class="sec">conflict modes · 부딪힐 때 나오는 세 가지</div><div style="display:flex;gap:12px;flex-wrap:wrap">'+modes+'</div><p style="margin:10px 0 0;font-size:13.5px;color:var(--faint)">갈등은 1→2→3단계로 진행되며 단계마다 모드가 바뀝니다(예: 분석 → 수용 → 주장). 이 순서가 그 사람의 갈등 시퀀스.</p>'+

function route(){
 var h=location.hash||'#/';
 if(h.indexOf('#/r/')===0){var code=decodeURIComponent(h.slice(4));var st=unpackAnswers(code);if(st){st.shared=true;st.phase='result';S=st;renderResult();window.scrollTo(0,0);return;}}
 if(h==='#/decoder'){renderDecoder();window.scrollTo(0,0);return;}
 if(h==='#/me'){if(S.shared){S=blank();S.phase='intro';}if(S.phase==='result'||S.phase==='assess'){renderApp();}else{S.phase='intro';renderApp();}window.scrollTo(0,0);return;}
